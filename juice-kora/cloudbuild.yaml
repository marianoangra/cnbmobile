# ─── cloudbuild.yaml ─────────────────────────────────────────────────────────
# CI/CD pipeline pra build e deploy do nó Kora no Cloud Run.
#
# Uso manual (do diretório juice-kora/):
#   gcloud builds submit --config cloudbuild.yaml

steps:
  # 1. Build da imagem Docker
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/juice-kora:$BUILD_ID
      - -t
      - gcr.io/$PROJECT_ID/juice-kora:latest
      - .

  # 2. Push pro Container Registry
  - name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/juice-kora']

  # 3. Deploy no Cloud Run (com min-instances=1 pra evitar cold starts)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - juice-kora
      - --image=gcr.io/$PROJECT_ID/juice-kora:$BUILD_ID
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --port=8080
      - --timeout=30s
      - --concurrency=80
      - --set-secrets=/secrets/kora-keypair.json=kora-keypair:latest

images:
  - gcr.io/$PROJECT_ID/juice-kora:$BUILD_ID
  - gcr.io/$PROJECT_ID/juice-kora:latest

options:
  logging: CLOUD_LOGGING_ONLY
